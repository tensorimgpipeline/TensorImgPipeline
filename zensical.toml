[project]
site_name = "TensorImgPipeline"
repo_url = "https://github.com/makanu/TensorImgPipeline"
site_url = "https://makanu.github.io/TensorImgPipeline"
site_description = "This is a repository for creating and running Tipi Pipelines."
site_author = "Matti Kaupenjohann"
edit_uri = "edit/main/docs/"
repo_name = "makanu/TensorImgPipeline"
copyright = 'Maintained by <a href="https://makanu.com">makanu</a>.'

nav = [
    { "Home" = "index.md" },
    { "Modules" = "modules.md" },
]

[project.plugins.mkdocstrings.handlers.python]
paths = ["tensorimgpipeline"]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]


[project.theme.icon]
previous = "fontawesome/solid/angle-left"
next = "fontawesome/solid/angle-right"
repo = "fontawesome/brands/github"

#[project.theme.font]
#text = "Inter"
#code = "Jetbrains Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "white"
accent = "deep orange"
toggle.icon =  "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "deep orange"
toggle.icon =  "material/brightness-4"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/makanu/TensorImgPipeline"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/TensorImgPipeline"

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.toc]
permalink = true
